<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时序记忆图谱可视化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" 
          integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"
            integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
          crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link rel="stylesheet" href="/static/css/graph-page.css">
  </head>
  <body>
      <div class="main-content">
          <h1>时序记忆图谱可视化</h1>
          
          <div class="stats-panel">
              <div class="gp-stats-row">
                  <!-- 统计信息 -->
                  <div class="gp-stats-counters">
                      <span class="gp-stat-item"><strong class="gp-stat-label">实体数量:</strong> <span id="entity-count" class="gp-stat-value">-</span></span>
                      <span class="gp-stat-item"><strong class="gp-stat-label">关系数量:</strong> <span id="relation-count" class="gp-stat-value">-</span></span>
                  </div>

                  <!-- 分隔线 -->
                  <div class="gp-vdivider"></div>

                  <!-- 控制参数 -->
                  <div class="gp-controls-group">
                      <div class="gp-field-group">
                          <label for="limit-entities-input" class="gp-field-label">显示实体数:</label>
                          <input type="number"
                                 id="limit-entities-input"
                                 class="search-count-input gp-input-narrow"
                                 min="1"
                                 value="50"
                                 placeholder="100">
                      </div>
                      <div class="gp-field-group">
                          <label for="limit-edges-input" class="gp-field-label">每实体边数:</label>
                          <input type="number"
                                 id="limit-edges-input"
                                 class="search-count-input gp-input-narrow"
                                 min="1"
                                 value="50"
                                 placeholder="50">
                      </div>
                      <div class="gp-field-group">
                          <label for="hops-input" class="gp-field-label">跳数:</label>
                          <input type="number"
                                 id="hops-input"
                                 class="search-count-input gp-input-narrow"
                                 min="1"
                                 value="1"
                                 placeholder="1">
                      </div>
                  </div>

                  <!-- 分隔线 -->
                  <div class="gp-vdivider"></div>

                  <!-- 图谱路径 -->
                  <div class="gp-path-group">
                      <label for="graph-path-input" class="gp-field-label">图谱路径:</label>
                      <input type="text"
                             id="graph-path-input"
                             class="search-input gp-path-input"
                             placeholder="./graph/tmg_storage">
                  </div>

                  <!-- 刷新按钮 -->
                  <button class="btn btn-primary btn-refresh gp-refresh-btn" onclick="loadGraph()">🔄 刷新图谱</button>

                  <!-- 最后更新时间 -->
                  <div class="gp-last-update">
                      最后更新: <span id="last-update">-</span>
                  </div>
              </div>
          </div>
          
          <div class="search-panel">
              <div class="search-controls">
                  <input type="text" 
                         id="search-input" 
                         class="search-input" 
                         placeholder="输入自然语言查询，例如：人物、事件、概念等..."
                         onkeypress="handleSearchKeyPress(event)">
                  <span class="search-count-label">结果数量:</span>
                  <input type="number" 
                         id="search-count-input" 
                         class="search-count-input" 
                         min="1" 
                         value="1"
                         placeholder="10">
                  <button class="search-btn" id="search-btn" onclick="searchGraph()">🔍 搜索</button>
                  <button class="clear-search-btn" id="clear-search-btn" onclick="clearSearch()" style="display: none;">清除搜索</button>
              </div>
              <div class="search-status" id="search-status"></div>
          </div>

          <!-- Source Tracing Panel -->
          <div class="source-tracing-panel">
              <div class="source-tracing-header">
                  <div class="source-tracing-title">
                      <i class="fas fa-route"></i>
                      溯源路径高亮
                  </div>
                  <div class="source-tracing-toggle">
                      <span class="gp-toggle-label">启用溯源</span>
                      <div class="toggle-switch" id="source-tracing-toggle" onclick="toggleSourceTracing()"></div>
                  </div>
              </div>
              <div class="source-tracing-info" id="source-tracing-info">
                  点击节点查看其溯源路径（连接到源观察文本的所有路径）
              </div>
          </div>

          <div id="mynetwork"></div>

          <!-- Timeline Slider -->
          <div class="timeline-container">
              <div class="timeline-header">
                  <div class="timeline-title">
                      <i class="fas fa-history"></i>
                      时间轴导航
                  </div>
                  <div class="timeline-controls">
                      <button class="timeline-btn" id="timeline-first" title="最早版本">
                          <i class="fas fa-fast-backward"></i>
                      </button>
                      <button class="timeline-btn" id="timeline-prev" title="上一个版本">
                          <i class="fas fa-step-backward"></i>
                      </button>
                      <button class="timeline-btn" id="timeline-play" title="自动播放">
                          <i class="fas fa-play"></i>
                      </button>
                      <button class="timeline-btn" id="timeline-next" title="下一个版本">
                          <i class="fas fa-step-forward"></i>
                      </button>
                      <button class="timeline-btn" id="timeline-last" title="最新版本">
                          <i class="fas fa-fast-forward"></i>
                      </button>
                      <button class="timeline-btn" id="timeline-reset" title="重置视图">
                          <i class="fas fa-sync-alt"></i>
                      </button>
                  </div>
                  <div class="color-legend">
                      <div class="legend-item">
                          <div class="legend-color legend-color-oldest"></div>
                          <span>最早</span>
                      </div>
                      <div class="legend-item">
                          <div class="legend-color legend-color-early"></div>
                          <span>早期</span>
                      </div>
                      <div class="legend-item">
                          <div class="legend-color legend-color-mid"></div>
                          <span>中期</span>
                      </div>
                      <div class="legend-item">
                          <div class="legend-color legend-color-recent"></div>
                          <span>近期</span>
                      </div>
                      <div class="legend-item">
                          <div class="legend-color legend-color-newest"></div>
                          <span>最新</span>
                      </div>
                  </div>
              </div>
              <div class="timeline-slider-wrapper">
                  <input type="range"
                         class="timeline-slider"
                         id="timeline-slider"
                         min="0"
                         max="100"
                         value="100"
                         step="1">
                  <div class="timeline-markers" id="timeline-markers"></div>
              </div>
              <div class="timeline-info">
                  <span id="timeline-earliest">加载中...</span>
                  <span class="timeline-current" id="timeline-current">当前: 最新版本</span>
                  <span id="timeline-latest">加载中...</span>
              </div>
          </div>
      </div>

      <!-- Encoding Legend Panel -->
      <div class="gp-legend-panel">
          <div class="gp-legend-panel-header">
              <i class="fas fa-info-circle"></i>
              图例说明
          </div>
          <div class="gp-legend-panel-body">
              <div class="gp-legend-row">
                  <div class="gp-legend-swatch-gradient"></div>
                  <span>颜色 = 时间 (蓝→红)</span>
              </div>
              <div class="gp-legend-row">
                  <div class="gp-legend-swatch-border-type"></div>
                  <span>边框 = 类型 (实线/虚线/点线)</span>
              </div>
              <div class="gp-legend-row">
                  <div class="gp-legend-swatch-opacity"></div>
                  <span>透明度 = 置信度</span>
              </div>
              <div class="gp-legend-row">
                  <div class="gp-legend-swatch-active"></div>
                  <span>绿边 = 最近活跃 (24h内)</span>
              </div>
              <div class="gp-legend-row">
                  <div class="gp-legend-swatch-source-path"></div>
                  <span>橙色路径 = 溯源链路</span>
              </div>
          </div>
      </div>

      <!-- Version Timeline Modal -->
      <div class="version-timeline-modal" id="version-timeline-modal">
          <div class="version-timeline-content">
              <div class="version-timeline-header">
                  <div class="version-timeline-title">
                      <i class="fas fa-stream"></i>
                      版本历史
                  </div>
                  <button class="version-timeline-close" id="version-timeline-close">
                      <i class="fas fa-times"></i>
                  </button>
              </div>
              <div class="version-timeline-track" id="version-timeline-track">
                  <div class="version-timeline-line"></div>
                  <!-- Version items will be dynamically added here -->
              </div>
          </div>
      </div>

      <!-- 右侧边栏 -->
      <div class="sidebar">
          <div class="sidebar-header">
              <div class="sidebar-title" id="sidebar-title">详细信息</div>
              <div class="sidebar-subtitle" id="sidebar-subtitle">点击节点或边查看详情</div>
          </div>
          <div class="sidebar-content" id="sidebar-content">
              <div class="empty-state">点击图谱中的节点或关系边查看详细信息</div>
          </div>
      </div>

    <!-- Legacy graph modules (split from inline script) -->
    <script src="/static/js/legacy-graph/state.js"></script>
    <script src="/static/js/legacy-graph/renderer.js"></script>
    <script src="/static/js/legacy-graph/timeline.js"></script>
    <script src="/static/js/legacy-graph/tracing.js"></script>
    <script src="/static/js/legacy-graph/versions.js"></script>
    <script src="/static/js/legacy-graph/init.js"></script>
</body>
</html>
